<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found · solo100.org</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="icon" type="image/png" href="images/logo-no-text-transparent.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&family=Ubuntu+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0d1117;
      --border:  rgba(255,255,255,.08);
      --accent:  #F7931A;
      --text:    #e6edf3;
      --muted:   #7d8590;
      --blur:    blur(12px);
      --font:    'Ubuntu', sans-serif;
      --mono:    'Ubuntu Mono', 'Courier New', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); font-weight: 300; min-height: 100vh; display: flex; flex-direction: column; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,17,23,.85);
      backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: 960px; margin: 0 auto; padding: 0 1.25rem;
      display: flex; align-items: center; height: 60px;
    }
    .logo { display: flex; align-items: center; gap: .5rem; font-size: 1.1rem; font-weight: 500; color: var(--text); text-decoration: none; }
    .logo:hover { text-decoration: none; }
    .logo-icon { height: 32px; width: 32px; object-fit: contain; }
    .accent { color: var(--accent); }

    main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 3rem 1.25rem;
    }
    .box { text-align: center; max-width: 440px; }
    .code {
      font-family: var(--mono); font-size: 6rem; font-weight: 700;
      color: var(--accent); line-height: 1; margin-bottom: 1rem;
      opacity: .15;
    }
    h1 { font-size: 1.6rem; font-weight: 500; margin-bottom: .75rem; }
    p  { color: var(--muted); font-size: .95rem; line-height: 1.6; margin-bottom: 2rem; }
    .actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .6rem 1.4rem; border-radius: 8px; font-size: .9rem;
      font-family: var(--font); font-weight: 500; cursor: pointer;
      text-decoration: none; transition: opacity .2s;
    }
    .btn:hover { opacity: .8; text-decoration: none; }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-ghost   { background: rgba(255,255,255,.06); color: var(--text); border: 1px solid var(--border); }

    .footer { border-top: 1px solid var(--border); padding: 1.1rem 0; font-size: .85rem; color: var(--muted); }
    .footer-inner { max-width: 960px; margin: 0 auto; padding: 0 1.25rem; display: flex; align-items: center; justify-content: center; gap: 2rem; flex-wrap: wrap; }
    .footer a { color: var(--muted); }
    .footer a:hover { color: var(--accent); }
  </style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="/" class="logo">
      <img src="images/logo-no-text-transparent.png" alt="solo100.org logo" class="logo-icon" />
      <span>solo<span class="accent">100</span>.org</span>
    </a>
  </div>
</header>

<main>
  <div class="box">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>This page doesn't exist — but the pool is still running. Head back and keep mining.</p>
    <div class="actions">
      <a href="/" class="btn btn-primary">Go to homepage</a>
      <a href="/#connect" class="btn btn-ghost">Connect your miner</a>
    </div>
  </div>
</main>

<footer class="footer">
  <div class="footer-inner">
    <span>Built in 🇪🇪 Estonia · Hosted in 🇩🇪 Germany</span>
    <span>© solo100.org · a <a href="https://solochance.org" target="_blank" rel="noopener">SoloChance.org</a> project</span>
    <span><a href="/terms.html">Terms</a> · <a href="/privacy.html">Privacy</a></span>
  </div>
</footer>

</body>
</html>
